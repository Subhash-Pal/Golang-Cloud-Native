apiVersion: apps/v1
kind: Deployment
metadata:
  name: hour56-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hour56-api
  template:
    metadata:
      labels:
        app: hour56-api
    spec:
      containers:
        - name: api
          image: docker.io/library/hour56-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
