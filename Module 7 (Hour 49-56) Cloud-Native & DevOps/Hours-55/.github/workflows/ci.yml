name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Run tests
        run: go test ./...

      - name: Build application
        run: go build -v .

      - name: Build Docker image
        run: docker build -t hour55-ci-api .
