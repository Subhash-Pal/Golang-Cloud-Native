services:
  nats:
    image: nats:2.11-alpine
    command:
      - -js
      - -sd
      - /data
      - -m
      - "8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  nats-data:
