name: CI/CD Pipeline

permissions:
  contents: read
  packages: write

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# CORRECT WAY: Use quotes for paths with spaces and special characters
env:
  APP_DIR: "Module 7 (Hour 49-56) Cloud-Native & DevOps/Hours-55"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Run tests
        run: go test -v -race ./...
        # CORRECT WAY: Reference the environment variable
        working-directory: ${{ env.APP_DIR }}

      - name: Build application
        run: go build -v .
        working-directory: ${{ env.APP_DIR }}